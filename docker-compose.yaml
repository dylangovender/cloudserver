version: "2.1"
services:
  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    environment:
      - PUID=${PUID}
      - PGID=${GUID}
      - TZ=${TZ}
      - USER=transmission
      - PASS=transmission #NEED TO CHANGE THIS
    volumes:
      - /transmission/config:/config
      - /mnt/onedrive/downloads:/downloads
      - /mnt/onedrive/downloads/watch:/watch
    ports:
      - 9091:9091
      - 51413:51413
      - 51413:51413/udp
    restart: unless-stopped
  transmission-mam:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission-mam
    environment:
      - PUID=${PUID}
      - PGID=${GUID}
      - TZ=${TZ}
      - USER=transmission
      - PASS=transmission #NEED TO CHANGE THIS
    volumes:
      - /transmission_mam/config:/config
      - /mnt/onedrive/downloads/books:/downloads
      - /mnt/onedrive/downloads/watch:/watch
    ports:
      - 9092:9091
      - 51414:51413
      - 51414:51413/udp
    restart: unless-stopped
  readarr:
    image: lscr.io/linuxserver/readarr:develop
    container_name: readarr
    environment:
      - PUID=${PUID}
      - PGID=${GUID}
      - TZ=${TZ}
    volumes:
      - /readarr/config:/config
      - /mnt/onedrive/books:/books
      - /mnt/onedrive/downloads/books/complete:/downloads/complete
    ports:
      - 8787:8787
    restart: unless-stopped
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID}
      - PGID=${GUID}
      - TZ=${TZ}
    volumes:
      - /prowlarr/config:/config
    ports:
      - 9696:9696
    restart: unless-stopped
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    network_mode: host
    environment:
      - PUID=${PUID}
      - PGID=${GUID}
      - TZ=${TZ}
      - VERSION=docker
      - PLEX_CLAIM= #optional
    volumes:
      - /plex/config:/config
      - /mnt/onedrive/downloads/complete:/tv
      - /mnt/onedrive/downloads/complete:/movies
      - /dev/shm:/transcode
    restart: unless-stopped

volumes:
  transcode:
    external: true
